<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tournée">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0d12">
<title>Tournée UPS</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<div id="import-view" class="view" data-view="import" hidden>
  <div class="import-screen">
    <h1>Préparation des données locales</h1>
    <p id="import-status">Initialisation…</p>
    <div class="progress-bar"><div id="import-progress-fill" class="progress-bar-fill" style="width:0%"></div></div>
    <p id="import-detail" class="muted"></p>
  </div>
</div>

<div id="tour-view" class="view" data-view="tour" hidden>
  <header class="view-header">
    <h1 id="tour-header-title">Tournée</h1>
    <div class="stats-row" id="tour-header-stats" style="flex-wrap:wrap;"></div>
    <div class="progress-bar" id="tour-header-progress" hidden><div id="tour-progress-fill" class="progress-bar-fill" style="width:0%"></div></div>
  </header>
  <div id="tour-content" class="view-content"></div>
  <button id="scan-fab" class="fab" type="button" aria-label="Scanner un colis">📷</button>
</div>

<div id="map-view" class="view" data-view="map" hidden>
  <header class="view-header"><h1>Carte</h1></header>
  <div id="map-content" class="view-content" style="padding:0;"></div>
</div>

<div id="settings-view" class="view" data-view="settings" hidden>
  <header class="view-header"><h1>Réglages</h1></header>
  <div id="settings-content" class="view-content"></div>
</div>

<nav id="bottom-nav" class="bottom-nav" hidden>
  <a href="#tour" data-nav="tour">Tournée</a>
  <a href="#map" data-nav="map">Carte</a>
  <a href="#settings" data-nav="settings">Réglages</a>
</nav>

<div id="toast-container" class="toast-container" aria-live="polite"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
